<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="专注、高效的平板支撑训练助手">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link rel="apple-touch-icon" href="/icon.svg">
  <title>Plank - 平板支撑助手</title>
  <link rel="stylesheet" href="src/styles/main.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <button class="mode-btn" id="modeBtn" aria-label="选择模式">
        <span class="mode-icon">◎</span>
        <span class="mode-text" id="modeText">经典平板支撑</span>
      </button>
      <button class="settings-btn" id="settingsBtn" aria-label="个人中心">
        <span class="settings-icon">👤</span>
      </button>
      <div class="sync-indicator" id="syncIndicator" style="display:none;"></div>
    </header>

    <main class="main">
      <div class="breath-container" id="breathContainer">
        <svg class="progress-ring" viewBox="0 0 300 300">
          <circle class="progress-ring-bg" cx="150" cy="150" r="135" />
          <circle class="progress-ring-fill" cx="150" cy="150" r="135" id="progressRingFill" />
        </svg>
        <div class="breath-ring"></div>
        <div class="timer-display" id="timerDisplay">60</div>
        <div class="breath-text" id="breathText">准备开始</div>
        <div class="pause-indicator" id="pauseIndicator">⏸</div>
        <div class="guide-card" id="guideCard"></div>
      </div>

      <div class="controls">
        <button class="btn btn-secondary" id="resetBtn" aria-label="重置">↺</button>
        <button class="btn btn-primary" id="startBtn" aria-label="开始">开始</button>
      </div>

      <div class="presets">
        <button class="preset" data-time="30">30s</button>
        <button class="preset active" data-time="60">60s</button>
        <button class="preset" data-time="90">90s</button>
        <button class="preset" data-time="120">2min</button>
        <button class="preset" data-time="custom">自定义</button>
      </div>

      <div class="stats" id="statsPanel">
        <div class="stat-item">
          <span class="stat-value" id="todayCount">0</span>
          <span class="stat-label">今日</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="weekCount">0</span>
          <span class="stat-label">本周</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="totalTime">0m</span>
          <span class="stat-label">总时长</span>
        </div>
      </div>

      <div class="action-buttons">
        <button class="action-btn" id="historyBtn">
          <span class="action-icon">📋</span>
          <span class="action-text" data-i18n="actions.history">训练记录</span>
        </button>
        <button class="action-btn" id="leaderboardBtn">
          <span class="action-icon">🏆</span>
          <span class="action-text" data-i18n="actions.leaderboard">排行</span>
        </button>
      </div>
    </main>

      <div class="mode-selector" id="modeSelector">
      <div class="mode-option" data-mode="classic">
        <span class="mode-emoji">🧘</span>
        <span>经典平板支撑</span>
      </div>
      <div class="mode-option" data-mode="side-left">
        <span class="mode-emoji">🙃</span>
        <span>左侧平板支撑</span>
      </div>
      <div class="mode-option" data-mode="side-right">
        <span class="mode-emoji">🤪</span>
        <span>右侧平板支撑</span>
      </div>
    </div>

    <div class="custom-time-modal" id="customModal">
      <div class="modal-content">
        <h3>设置时长</h3>
        <div class="custom-input-group">
          <input type="number" id="customTimeInput" min="10" max="600" value="60">
          <span>秒</span>
        </div>
        <div class="modal-buttons">
          <button class="btn btn-secondary" id="cancelCustom">取消</button>
          <button class="btn btn-primary" id="confirmCustom">确认</button>
        </div>
      </div>
    </div>

    <div class="completion-overlay" id="completionOverlay">
      <div class="completion-content">
        <div class="confetti" id="confetti"></div>
        <div class="completion-icon">🎉</div>
        <div class="completion-time" id="completionTime">60秒</div>
        <div class="completion-stats" id="completionStats">完美完成 🎯</div>
        <div class="completion-message" id="completionMessage">太棒了！继续保持！</div>
        <button class="btn btn-primary" id="doneBtn">完成</button>
      </div>
    </div>

    <div class="history-overlay" id="historyOverlay">
      <div class="history-content">
        <div class="history-header">
          <div class="history-tabs">
            <button class="history-tab active" data-tab="history" type="button">训练记录</button>
            <button class="history-tab" data-tab="trend" type="button">趋势</button>
          </div>
          <button class="history-close" id="historyClose" type="button">×</button>
        </div>
        <div class="history-list" id="historyList"></div>
        <div class="trend-panel" id="trendPanel" style="display:none;">
          <canvas id="trendChart"></canvas>
        </div>
      </div>
    </div>

    <div class="leaderboard-overlay" id="leaderboardOverlay">
      <div class="leaderboard-content">
        <div class="history-header">
          <h3 style="color: var(--text); font-size: 18px; font-weight: 600;">排行榜</h3>
          <button class="history-close" id="leaderboardClose" type="button">×</button>
        </div>
        <div class="leaderboard-list" id="leaderboardList"></div>
      </div>
    </div>

    <div class="login-modal" id="loginModal">
      <div class="login-content">
        <div class="login-header">
          <h3 id="loginTitle">登录后查看排行榜</h3>
          <button class="login-close" id="loginClose">×</button>
        </div>
        <div class="login-form">
          <div class="login-input-group">
            <input type="email" id="loginEmail" placeholder="邮箱" autocomplete="email">
          </div>
          <div class="login-input-group">
            <input type="password" id="loginPassword" placeholder="密码" autocomplete="current-password">
          </div>
          <div class="login-error" id="loginError" style="display:none;"></div>
          <div class="login-buttons">
            <button class="btn btn-secondary" id="loginSwitchBtn">注册</button>
            <button class="btn btn-primary" id="loginSubmitBtn">登录</button>
          </div>
        </div>
      </div>
    </div>

    <div class="settings-overlay" id="settingsOverlay">
      <div class="settings-content">
        <div class="settings-header">
          <h3 data-i18n="settings.title">设置</h3>
          <button class="settings-close" id="settingsClose">×</button>
        </div>

        <div class="settings-scroll">
          <div class="settings-section">
            <div class="profile-header">
              <div class="profile-avatar-wrapper">
                <div class="profile-avatar" id="profileAvatar">👤</div>
              </div>
              <div class="profile-info">
                <input type="text" class="profile-nickname" id="profileNickname"
                       data-i18n-placeholder="settings.nickname" placeholder="设置昵称" maxlength="20">
              </div>
            </div>
            <div class="profile-stats">
              <div class="profile-stat">
                <span class="stat-num" id="profileTotalSessions">0</span>
                <span class="stat-label" data-i18n="settings.sessions">训练次数</span>
              </div>
              <div class="profile-stat">
                <span class="stat-num" id="profileTotalTime">0m</span>
                <span class="stat-label" data-i18n="settings.totalTime">累计时长</span>
              </div>
            </div>
            <div class="profile-email" id="profileEmail"></div>
          </div>

          <div class="settings-group">
            <div class="settings-group-title" data-i18n="settings.language">语言</div>
            <div class="language-selector">
              <button class="lang-btn" data-lang="zh">
                <span class="lang-name">简体中文</span>
              </button>
              <button class="lang-btn" data-lang="en">
                <span class="lang-name">English</span>
              </button>
              <button class="lang-btn" data-lang="yue">
                <span class="lang-name">粤语</span>
              </button>
            </div>
          </div>

          <div class="settings-group">
            <div class="settings-group-title" data-i18n="settings.voice">语音播报</div>
            <div class="settings-row">
              <span data-i18n="settings.voiceEnabled">启用语音</span>
              <label class="toggle">
                <input type="checkbox" id="voiceEnabled" checked>
                <span class="toggle-slider"></span>
              </label>
            </div>
            <div class="settings-row">
              <span data-i18n="settings.voiceType">播报语言</span>
              <select id="voiceType" class="settings-select">
                <option value="zh" data-i18n="voiceTypes.zh">中文</option>
                <option value="en" data-i18n="voiceTypes.en">English</option>
                <option value="yue" data-i18n="voiceTypes.yue">粤语</option>
              </select>
            </div>
          </div>

          <div class="settings-group">
            <div class="settings-group-title" data-i18n="settings.account">账户</div>
            <button class="settings-action-btn danger" id="logoutBtn" data-i18n="settings.logout">
              退出登录
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="src/lib/supabase.js"></script>
  <script type="module" src="src/lib/auth.js"></script>
  <script type="module" src="src/lib/database.js"></script>
  <script type="module" src="src/lib/voice.js"></script>
  <script type="module" src="src/i18n/index.js"></script>
  <script type="module" src="src/core/app.js"></script>
</body>
</html>
